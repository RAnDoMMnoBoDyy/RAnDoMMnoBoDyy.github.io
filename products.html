	<style>
		/* Navigation bar styles */
		nav {
			background-color: #006400;
			color: #397426;
			display: flex;
			justify-content: center;
			align-items: center;
			height: 50px;
			position: fixed;
			top: 0;
			width: 100%;
			background-color: #3e7b3a;
		}

		nav ul {
			display: flex;
			list-style: none;
			margin: 0;
			padding: 0;
		}

		nav li {
			margin: 0 10px;
		}

		nav a {
			color: #000000;
			text-decoration: none;
			font-size: 18px;
			padding: 10px;
		}

		nav a:hover {
			background-color: #fff;
			color: #006400;
			transition: all 0.3s ease;
		}

		body {
			background-color: #C8E6C9;
			font-family: Georgia, serif;
		}

		h1, p, div {
			color: black;
			text-align: center;
		}

		img {
			display: block;
			margin: 0 auto;
		}

		img:first-of-type {
			width: 300px;
			height: 300px;
		}
	</style>
</head>
